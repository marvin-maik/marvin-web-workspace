<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><style>
@font-face{font-family:'Fraunces';src:url('fonts/fraunces-900.woff2') format('woff2');font-weight:900}
@font-face{font-family:'Fraunces';src:url('fonts/fraunces-600italic.woff2') format('woff2');font-weight:600;font-style:italic}
@font-face{font-family:'Pinyon';src:url('fonts/pinyon.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#EADFC9;position:relative;overflow:hidden;font-family:'Fraunces',serif;
  background-image:radial-gradient(120% 90% at 50% -20%,#F6EEDD,transparent 60%)}
.rand{position:absolute;inset:24px;border:2px solid #B4241C}
.nadel{position:absolute;left:24px;right:24px;top:24px;height:6px;background:repeating-linear-gradient(90deg,#B4241C 0 2px,transparent 2px 9px)}
.in{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 90px}
.logo{width:150px;margin-bottom:16px}
.alt{font-weight:900;font-size:62px;line-height:1;color:#B4241C;letter-spacing:-.01em}
.alt em{font-style:italic}
.brot{font-weight:900;font-size:40px;color:#33271A;margin-top:10px}
.brot .s{font-family:'Pinyon';font-style:normal;font-weight:400;color:#B4241C;font-size:1.5em;line-height:.5;display:inline-block;vertical-align:-8px}
.unten{position:absolute;bottom:52px;left:0;right:0;text-align:center;font:600 22px/1 ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:#6B4A28}
</style></head>
<body>
<div class="rand"></div><div class="nadel"></div>
<div class="in">
  <img class="logo" src="img/siebert-logo.svg" alt="">
  <div class="alt">Berlins <em>älteste</em> Bäckerei</div>
  <div class="brot">Echtes Brot, <span class="s">seit 1906</span></div>
</div>
<p class="unten">Schönfließer Straße 12 · Prenzlauer Berg</p>
</body></html>
