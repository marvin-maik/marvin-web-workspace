<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'League Gothic';src:url('fonts/league-gothic.woff2') format('woff2')}
@font-face{font-family:'Source Sans 3';src:url('fonts/source-sans-3-600.woff2') format('woff2');font-weight:600}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#1E3932;position:relative;overflow:hidden;font-family:'Source Sans 3',sans-serif}
.rand{position:absolute;inset:26px;border:3px double #CBA258}
.inhalt{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 90px}
.label{font:600 22px/1 'Source Sans 3';letter-spacing:.22em;text-transform:uppercase;color:#CBA258;margin-bottom:26px}
h1{font:400 124px/1 'League Gothic',Impact,sans-serif;text-transform:uppercase;letter-spacing:.015em;word-spacing:.12em;color:#F7F2E9}
h1 b{color:#CBA258;font-weight:400}
.unten{position:absolute;bottom:58px;left:0;right:0;text-align:center;font:600 24px/1 'Source Sans 3';color:#CBA258;letter-spacing:.06em}
</style>
</head>
<body>
<div class="rand"></div>
<div class="inhalt">
  <p class="label">Bäckerei &amp; Konditorei Siebert</p>
  <h1>Berlins älteste Bäckerei.<br><b>Seit 1906.</b></h1>
</div>
<p class="unten">Schönfließer Straße 12 · Prenzlauer Berg</p>
</body>
</html>
