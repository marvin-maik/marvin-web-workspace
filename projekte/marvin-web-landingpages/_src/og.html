<!doctype html>
<html lang="de"><head><meta charset="utf-8"><style>
@font-face{font-family:'Clash Display';src:url('../fonts/clash-display-700.woff2') format('woff2');font-weight:700}
html,body{margin:0;width:1200px;height:630px;overflow:hidden}
body{background:#f5f1e8;color:#161412;font-family:'Clash Display',sans-serif;position:relative}
.inhalt{position:absolute;inset:0;padding:70px 76px;display:flex;flex-direction:column;justify-content:space-between}
.label{font-family:ui-monospace,Menlo,monospace;font-size:21px;letter-spacing:.16em;text-transform:uppercase;font-weight:500}
.label b{color:#b53507;font-weight:500}
h1{font-size:104px;line-height:.95;margin:0;font-weight:700;text-transform:uppercase;letter-spacing:-0.012em;word-spacing:.16em;max-width:1000px}
h1 em{font-style:normal;color:#e8440a}
.rule{height:12px;max-width:640px;
  background:
    repeating-linear-gradient(90deg,#e8440a 0 2px,transparent 2px 24px) bottom/100% 9px no-repeat,
    linear-gradient(#e8440a,#e8440a) bottom/100% 3px no-repeat}
.sub{font-family:ui-monospace,Menlo,monospace;font-size:20px;color:#6d675a;letter-spacing:.04em}
.mitte{display:flex;flex-direction:column;gap:34px}
</style></head>
<body>
<div class="inhalt">
  <p class="label">// <b>MARVIN.WEB</b> · WEBSITES ZUM FESTPREIS</p>
  <div class="mitte">
    <h1>Einmal bezahlen <em>statt jeden Monat.</em></h1>
    <div class="rule"></div>
  </div>
  <p class="sub">✓ 0 € Plattformkosten &nbsp;·&nbsp; ✓ Texte inklusive &nbsp;·&nbsp; ✓ In 5 Arbeitstagen live</p>
</div>
</body></html>
